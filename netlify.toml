[build]
  publish = "."

# Pages légales regroupées dans /legal/ (rangement 2026-06-26) — redirections 301 des anciennes URLs
[[redirects]]
  from = "/cgv.html"
  to = "/legal/cgv.html"
  status = 301

[[redirects]]
  from = "/mentions-legales.html"
  to = "/legal/mentions-legales.html"
  status = 301

[[redirects]]
  from = "/politique-confidentialite.html"
  to = "/legal/politique-confidentialite.html"
  status = 301

# Bloquer l'accès aux fichiers internes (études, brand-book, archives, instructions Claude)
[[redirects]]
  from = "/_archive/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/brand-book.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/rebranding-noms.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/rebranding-shortlist.md"
  to = "/"
  status = 404
  force = true

# Headers de sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache long pour les assets statiques (images, polices, css figés)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
